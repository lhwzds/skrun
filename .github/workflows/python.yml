name: Python Package

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "crates/**"
      - "examples/**"
      - "python/**"
      - "scripts/check.sh"
      - ".github/workflows/python.yml"
  pull_request:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "crates/**"
      - "examples/**"
      - "python/**"
      - "scripts/check.sh"
      - ".github/workflows/python.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /tmp/skrun-python-target
  PYTHON_VENV: /tmp/skrun-python-venv
  WHEEL_DIR: /tmp/skrun-python-dist

jobs:
  package:
    name: Build and smoke-test Python package
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/skrun-python-target
          key: ${{ runner.os }}-python-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-cargo-

      - name: Create Python build environment
        run: scripts/check.sh bootstrap

      - name: Run Python contract tests
        run: scripts/check.sh python

      - name: Run Rust checks for native bridge
        run: scripts/check.sh rust

      - name: Install package in editable mode
        run: scripts/check.sh develop

      - name: Smoke-test installed native package
        run: scripts/check.sh smoke

      - name: Build wheel
        run: scripts/check.sh build

      - name: Build source distribution
        run: scripts/check.sh sdist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: skrun-python-dist
          path: |
            /tmp/skrun-python-dist/*.whl
            /tmp/skrun-python-dist/*.tar.gz
          if-no-files-found: error
